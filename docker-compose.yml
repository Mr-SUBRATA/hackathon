services:
  backend:
    build:
      context: ./backend
    container_name: traffic-backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: traffic-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped
